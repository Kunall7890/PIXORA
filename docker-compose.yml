version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - LOG_LEVEL=INFO
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - pixora-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    networks:
      - pixora-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - pixora-network

networks:
  pixora-network:
    driver: bridge
